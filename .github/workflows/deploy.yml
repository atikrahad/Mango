name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      # ---------------- WEB ----------------
      - name: Deploy Web
        run: |
          mkdir -p /var/www/web
          # Copy the entire standalone directory, then place static/public assets into apps/web/
          rsync -av --delete apps/web/.next/standalone/ /var/www/web/
          mkdir -p /var/www/web/apps/web
          [ -d apps/web/.next/static ] && rsync -av --delete apps/web/.next/static/ /var/www/web/apps/web/.next/static/ || true
          [ -d apps/web/public ] && rsync -av --delete apps/web/public/ /var/www/web/apps/web/public/ || true

      # ---------------- ADMIN ----------------
      - name: Deploy Admin
        run: |
          mkdir -p /var/www/admin
          # Copy the entire standalone directory, then place static/public assets into apps/admin/
          rsync -av --delete apps/admin/.next/standalone/ /var/www/admin/
          mkdir -p /var/www/admin/apps/admin
          [ -d apps/admin/.next/static ] && rsync -av --delete apps/admin/.next/static/ /var/www/admin/apps/admin/.next/static/ || true
          [ -d apps/admin/public ] && rsync -av --delete apps/admin/public/ /var/www/admin/apps/admin/public/ || true

      # ---------------- API ----------------
      - name: Deploy API
        run: |
          mkdir -p /var/www/api
          mkdir -p /var/www/packages/database
          mkdir -p /var/www/packages/shared
          
          # Copy internal packages (keeping structure intact for symlink resolution)
          rsync -av --delete packages/database/dist/ /var/www/packages/database/dist/
          rsync -av --delete packages/database/package.json /var/www/packages/database/package.json
          [ -d packages/shared/dist ] && rsync -av --delete packages/shared/dist/ /var/www/packages/shared/dist/ || true
          rsync -av --delete packages/shared/package.json /var/www/packages/shared/package.json

          # Copy NestJS build & package.json
          rsync -av --delete apps/api/package.json /var/www/api/package.json
          rsync -av --delete apps/api/dist/ /var/www/api/dist/
          
          # Copy node_modules preserving symlinks (no -L)
          rsync -av --delete node_modules/ /var/www/api/node_modules/
          
          # Run database schema push using the production .env file in /var/www/api
          cd /var/www/api
          npx prisma db push --schema=node_modules/@mangosteen/database/prisma/schema.prisma --accept-data-loss

      # ---------------- PM2 SAFE START ----------------
      - name: Start or Reload PM2
        run: |
          pm2 describe web >/dev/null 2>&1 && pm2 reload web || pm2 start server.js --name web --cwd /var/www/web/apps/web
          pm2 describe admin >/dev/null 2>&1 && pm2 reload admin || pm2 start server.js --name admin --cwd /var/www/admin/apps/admin
          pm2 describe api >/dev/null 2>&1 && pm2 reload api || pm2 start dist/apps/api/src/main.js --name api --cwd /var/www/api

          pm2 save
